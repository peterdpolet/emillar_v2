# docker-compose.yml
# Production stack for ewanmillarltd.co.uk

services:

  # ── PostgreSQL database ──────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: emillar_db
    restart: always
    environment:
      POSTGRES_DB: emdb_v1
      POSTGRES_USER: dbadmin
      POSTGRES_PASSWORD: PDPUbuntu_24_25
    volumes:
      - emillar_postgres_data:/var/lib/postgresql/data
    networks:
      - emillar_network

  # ── Redis (channel layer for WebSockets) ─────────────────
  redis:
    image: redis:7-alpine
    container_name: emillar_redis
    restart: always
    networks:
      - emillar_network

  # ── Django / Gunicorn (HTTP) ─────────────────────────────
  backend:
    build: ./backend
    container_name: emillar_backend
    restart: always
    env_file:
      - .env.docker.prod
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.production
      DB_HOST: db
      DB_PORT: 5432
      REDIS_HOST: redis
    depends_on:
      - db
      - redis
    volumes:
      - emillar_static:/app/staticfiles
    networks:
      - emillar_network
    command: >
      sh -c "python manage.py migrate &&
             python manage.py collectstatic --noinput &&
             gunicorn config.wsgi:application --bind 0.0.0.0:8000 --workers 3"

  # ── Daphne (WebSockets) ───────────────────────────────────
  daphne:
    build: ./backend
    container_name: emillar_daphne
    restart: always
    env_file:
      - .env.docker.prod
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.production
      DB_HOST: db
      DB_PORT: 5432
      REDIS_HOST: redis
    depends_on:
      - db
      - redis
    networks:
      - emillar_network
    command: daphne -b 0.0.0.0 -p 9000 config.asgi:application

  # ── Vue SPA ───────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: https://ewanmillarltd.co.uk
    container_name: emillar_frontend
    restart: always
    networks:
      - emillar_network

  # ── Nginx reverse proxy ───────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: emillar_nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - emillar_static:/staticfiles:ro
    depends_on:
      - backend
      - daphne
      - frontend
    networks:
      - emillar_network

volumes:
  emillar_postgres_data:
  emillar_static:

networks:
  emillar_network:
    driver: bridge
