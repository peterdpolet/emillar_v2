# nginx/default.conf
# Outer reverse proxy - routes traffic by domain
# Handles SSL termination for all sites on this droplet

# ── ewanmillarltd.co.uk ───────────────────────────────────

# Redirect HTTP to HTTPS
server {
    listen 80;
    server_name ewanmillarltd.co.uk www.ewanmillarltd.co.uk;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name ewanmillarltd.co.uk www.ewanmillarltd.co.uk;

    ssl_certificate     /etc/letsencrypt/live/ewanmillarltd.co.uk/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/ewanmillarltd.co.uk/privkey.pem;

    # Django API
    location /api/ {
        proxy_pass         http://emillar_backend:8000;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # Django Admin
    location /admin/ {
        proxy_pass         http://emillar_backend:8000;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # Django static files (collected to backend/staticfiles)
    location /static/ {
        alias /staticfiles/;
        expires 30d;
        add_header Cache-Control "public";
    }

    # Vue SPA (everything else)
    location / {
        proxy_pass         http://emillar_frontend:80;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
    }
}
