# nginx/default.conf

server {
    listen 80;
    server_name ewanmillarltd.co.uk www.ewanmillarltd.co.uk;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name ewanmillarltd.co.uk www.ewanmillarltd.co.uk;

    ssl_certificate     /etc/letsencrypt/live/ewanmillarltd.co.uk/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/ewanmillarltd.co.uk/privkey.pem;

    # ── WebSockets → Daphne ───────────────────────────────
    location /ws/ {
        proxy_pass         http://emillar_daphne:9000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;  # 24hrs - keep WS connections alive
    }

    # ── Django API → Gunicorn ─────────────────────────────
    location /api/ {
        proxy_pass         http://emillar_backend:8000;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ── Django Admin → Gunicorn ───────────────────────────
    location /admin/ {
        proxy_pass         http://emillar_backend:8000;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ── Django static files ───────────────────────────────
    location /static/ {
        alias /staticfiles/;
        expires 30d;
        add_header Cache-Control "public";
    }

    # ── Vue SPA ───────────────────────────────────────────
    location / {
        proxy_pass         http://emillar_frontend:80;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
    }
}
