# frontend/nginx-frontend.conf
# Serves the Vue SPA inside the frontend container
# The outer nginx container handles SSL and proxying

server {
    listen 80;

    root /usr/share/nginx/html;
    index index.html;

    # Vue Router - serve index.html for all routes
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets aggressively (Vite fingerprints filenames)
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
